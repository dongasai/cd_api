; 生产容器 - Apache + mod_php (基于 php:8.3-apache 镜像)
[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:init-permissions]
command=bash -c "mkdir -p /var/www/html/storage/logs /var/www/html/storage/app/public /var/www/html/storage/framework/cache /var/www/html/storage/framework/sessions /var/www/html/storage/framework/views /var/www/html/bootstrap/cache && chown -R php:php /var/www/html/storage /var/www/html/bootstrap/cache && chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache"
directory=/var/www/html
autostart=true
autorestart=false
user=root
stdout_logfile=/var/log/supervisor/init-permissions.log
stderr_logfile=/var/log/supervisor/init-permissions.log

[program:build-cache]
command=bash -c "composer run build-cache"
directory=/var/www/html
autostart=true
autorestart=false
user=php
stdout_logfile=/var/log/supervisor/build-cache.log
stderr_logfile=/var/log/supervisor/build-cache.log

[program:apache2]
command=/usr/sbin/apache2ctl -D FOREGROUND
autostart=true
autorestart=true
user=root
stdout_logfile=/var/log/supervisor/apache2.log
stderr_logfile=/var/log/supervisor/apache2.log

[program:queue-worker]
command=php artisan queue:listen -v --sleep=3 --tries=3
directory=/var/www/html
autostart=true
autorestart=true
user=php
stdout_logfile=/var/log/supervisor/queue-worker.log
stderr_logfile=/var/log/supervisor/queue-worker.log

[program:schedule-worker]
command=php artisan schedule:work -v
directory=/var/www/html
autostart=true
autorestart=true
user=php
stdout_logfile=/var/log/supervisor/schedule-worker.log
stderr_logfile=/var/log/supervisor/schedule-worker.log


