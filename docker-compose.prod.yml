version: '3.8'

name: cdapi-prod

services:
  app:
    container_name: cd_api
    image: ghcr.io/dongasai/cd_api:latest
    restart: unless-stopped
    # command: composer run devd
    volumes:
      - .:/www/var/html
      - ./docker/000-default.local.conf:/etc/apache2/sites-available/000-default.conf
    ports:
      - "32127:80"
